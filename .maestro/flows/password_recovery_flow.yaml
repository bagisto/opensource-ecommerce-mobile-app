appId: com.webkul.bagistoApp.iOS
---
# ═════════════════════════════════════════════════════════════════════════════
# PASSWORD RECOVERY FLOW TEST
# ═════════════════════════════════════════════════════════════════════════════
# This flow covers:
# - Password recovery/forgot password navigation
# - Email submission for password reset
# - Validation of email format
# - Success/error message handling
# - Back navigation to login
#
# Preconditions: App is installed
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# 1. NAVIGATE TO LOGIN PAGE
# ─────────────────────────────────────────────────────────────────────────────
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 2. VERIFY LOGIN PAGE LOADS
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "Login|Welcome back"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 3. NAVIGATE TO FORGOT PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
# Test: Find and tap "Forgot Password" link
- tapOn:
    text: "Forgot Password|Forgot Password?|Reset Password"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 4. VERIFY FORGOT PASSWORD PAGE LOADS
# ─────────────────────────────────────────────────────────────────────────────
# Verify we're on the password reset page
- assertVisible:
    text: "Reset Password|Recover Password|Forgot Password"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 5. VERIFY EMAIL FIELD IS PRESENT
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    type: "TextField"


# ─────────────────────────────────────────────────────────────────────────────
# 6. TEST EMPTY EMAIL SUBMISSION
# ─────────────────────────────────────────────────────────────────────────────
# Try to submit without entering email
- tapOn:
    text: "Submit|Send|Reset|Continue"
    isRegex: true
- waitForAnimationToEnd

# Verify validation error for empty email
- assertVisible:
    text: "required|email|enter|please"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 7. TEST INVALID EMAIL FORMAT
# ─────────────────────────────────────────────────────────────────────────────
# Enter invalid email format
- tapOn:
    type: "TextField"
    index: 0
- inputText: "notanemail"

# Submit
- tapOn:
    text: "Submit|Send|Reset|Continue"
    isRegex: true
- waitForAnimationToEnd

# Verify validation error for invalid email format
- assertVisible:
    text: "valid|email|format|invalid"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 8. TEST VALID EMAIL SUBMISSION
# ─────────────────────────────────────────────────────────────────────────────
# Clear field and enter valid email
- tapOn:
    type: "TextField"
    index: 0
- doubleTap
- inputText: "test@example.com"

- waitForAnimationToEnd

# Submit
- tapOn:
    text: "Submit|Send|Reset|Continue"
    isRegex: true
- waitForAnimationToEnd

# Wait for response
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 9. VERIFY SUCCESS MESSAGE OR NAVIGATION
# ─────────────────────────────────────────────────────────────────────────────
# Check for success message or navigation
# The app might show "Check your email" or redirect to login
- assertVisible:
    text: "check|email|sent|success|reset|link|back|login"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 10. BACK TO LOGIN NAVIGATION
# ─────────────────────────────────────────────────────────────────────────────
# Try to go back to login page
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd

# Verify we're back at login
- assertVisible:
    text: "Login|Welcome back"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 11. VERIFY PASSWORD FIELD IS MASKED ON LOGIN
# ─────────────────────────────────────────────────────────────────────────────
# Verify password field exists and is masked
- tapOn:
    type: "TextField"
    index: 1
- inputText: "test"
- waitForAnimationToEnd

# Verify password is masked (this is a UI check - password should show dots/circles)
# This is implicit in the app design


# ─────────────────────────────────────────────────────────────────────────────
# 12. RE-TRY FORGOT PASSWORD WITH DIFFERENT EMAIL
# ─────────────────────────────────────────────────────────────────────────────
# Go to forgot password again
- tapOn:
    text: "Forgot Password|Forgot Password?|Reset Password"
    isRegex: true
- waitForAnimationToEnd

# Enter another email
- tapOn:
    type: "TextField"
    index: 0
- inputText: "another@test.com"

- tapOn:
    text: "Submit|Send|Reset|Continue"
    isRegex: true
- waitForAnimationToEnd

# Verify behavior is consistent
- waitForAnimationToEnd
