appId: com.webkul.bagistoApp.iOS
---
# ═════════════════════════════════════════════════════════════════════════════
# EDGE CASES FLOW TEST
# ═════════════════════════════════════════════════════════════════════════════
# This flow covers edge cases and error handling:
# - Network errors handling
# - Empty category (no products)
# - Out of stock items
# - Session timeout handling
# - App backgrounding/foregrounding
# - Search with no results
# - Invalid input validation
#
# Preconditions: App is installed
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# 1. TEST APP BACKGROUNDING/FOREGROUNDING
# ─────────────────────────────────────────────────────────────────────────────
# Test: App can be backgrounded and restored without crash
- launchApp
- waitForAnimationToEnd

# Navigate to a page with content
- tapOn:
    text: "Home"
    index: 0
- waitForAnimationToEnd

# Background the app (press home button equivalent)
- pressKey: Home
- waitForAnimationToEnd

# Bring app to foreground
- launchApp
- waitForAnimationToEnd

# Verify app state is preserved
- assertVisible:
    text: "Home|Featured Products"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 2. TEST EMPTY SEARCH RESULTS
# ─────────────────────────────────────────────────────────────────────────────
# Test: Search with no results shows appropriate message
- tapOn:
    text: "Home"
    index: 0
- waitForAnimationToEnd

# Tap search icon
- tapOn:
    type: "Icon"
    index: 1
- waitForAnimationToEnd

# Enter search term unlikely to match anything
- tapOn:
    type: "TextField"
    index: 0
- inputText: "xyznonexistentproduct12345"
- waitForAnimationToEnd

# Submit search
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd

# Verify empty state message
- assertVisible:
    text: "No results|not found|empty|0 results"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 3. TEST CATEGORY WITH NO PRODUCTS
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to categories
- tapOn:
    text: "Categories"
    index: 0
- waitForAnimationToEnd

# Try to find a subcategory or scroll to find empty category
- scroll
- waitForAnimationToEnd

# If we can find an empty category, verify empty state
# Otherwise, this test verifies the navigation works


# ─────────────────────────────────────────────────────────────────────────────
# 4. TEST OUT OF STOCK HANDLING
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to categories
- tapOn:
    text: "Categories"
    index: 0
- waitForAnimationToEnd

# Select a category
- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Scroll to find products
- scroll
- waitForAnimationToEnd

# Select a product if available
- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Check for out of stock indicator
- scroll
- waitForAnimationToEnd

# Look for stock status (may show "Out of Stock" or similar)
- assertVisible:
    text: "Out of Stock|In Stock|Available"
    isRegex: true

# If out of stock, verify "Add to Cart" is disabled or shows message
- scroll:
    down: 2

# Go back
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 5. TEST SESSION TIMEOUT HANDLING
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to account
- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd

# Check if login is required or session is valid
# This test verifies the app handles session state

# If logged in, logout to test from logged out state
- scroll
- waitForAnimationToEnd

# Look for logout button if logged in
- tapOn:
    text: "Logout"
- waitForAnimationToEnd

# Verify we're back at login screen (session cleared)
- assertVisible:
    text: "Login|Welcome back"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 6. TEST INVALID INPUT VALIDATION (LOGIN)
# ─────────────────────────────────────────────────────────────────────────────
# Test: Empty email/password validation
- tapOn:
    text: "Login"
- waitForAnimationToEnd

# Try to login without entering credentials
- tapOn:
    text: "Login"
    index: 0
- waitForAnimationToEnd

# Verify validation error (email required)
- assertVisible:
    text: "required|valid|email|password"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 7. TEST INVALID EMAIL FORMAT
# ─────────────────────────────────────────────────────────────────────────────
# Enter invalid email format
- tapOn:
    type: "TextField"
    index: 0
- inputText: "notanemail"

# Try to login
- tapOn:
    text: "Login"
    index: 0
- waitForAnimationToEnd

# Verify email format error
- assertVisible:
    text: "valid|email|format"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 8. TEST CART TOTAL CALCULATION EDGE CASES
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to cart
- tapOn:
    text: "Cart"
    index: 0
- waitForAnimationToEnd

# If cart has items, verify totals are calculated correctly
# Check for price display
- scroll


# ─────────────────────────────────────────────────────────────────────────────
# 9. TEST BACK NAVIGATION PRESERVES STATE
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to categories
- tapOn:
    text: "Categories"
    index: 0
- waitForAnimationToEnd

# Select a category
- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Scroll to a position
- scroll:
    down: 3
- waitForAnimationToEnd

# Go back
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd

# Re-enter category
- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Verify scroll position is maintained or reset appropriately
- scroll


# ─────────────────────────────────────────────────────────────────────────────
# 10. TEST MULTI-TASK SWITCHING
# ─────────────────────────────────────────────────────────────────────────────
# Test switching between app and other apps
- pressKey: Home
- waitForAnimationToEnd

# Simulate switching to another app (just launch again)
- launchApp
- waitForAnimationToEnd

# Verify app restores to previous state
- assertVisible:
    text: "Home|Categories|Cart|Account"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 11. TEST ERROR RECOVERY - NETWORK ERROR SIMULATION
# ─────────────────────────────────────────────────────────────────────────────
# This test verifies the app handles loading states properly

# Navigate to home
- tapOn:
    text: "Home"
    index: 0
- waitForAnimationToEnd

# Scroll to trigger loading more content
- scroll:
    down: 5
- waitForAnimationToEnd

# Verify content loads or shows appropriate loading state
- assertVisible:
    text: "Home|Featured Products|Loading"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 12. TEST VERY LONG INPUT HANDLING
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to login
- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd

# Try to enter very long text in email field
- tapOn:
    text: "Login"
- waitForAnimationToEnd

- tapOn:
    type: "TextField"
    index: 0
- inputText: "this_is_a_very_long_string_that_might_exceed_normal_input_limits_and_should_be_handled_gracefully_by_the_application"
- waitForAnimationToEnd

# Verify app doesn't crash and handles input


# ─────────────────────────────────────────────────────────────────────────────
# 13. TEST SPECIAL CHARACTERS IN SEARCH
# ─────────────────────────────────────────────────────────────────────────────
# Clear the search field
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd

# Try searching with special characters
- tapOn:
    type: "TextField"
    index: 0
- inputText: "!@#$%^&*()"
- waitForAnimationToEnd

# Submit search
- tapOn:
    type: "Icon"
    index: 0
- waitForAnimationToEnd

# App should handle this gracefully - either show no results or ignore special chars
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 14. TEST PRICE DISPLAY EDGE CASES
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to a category with products
- tapOn:
    text: "Categories"
    index: 0
- waitForAnimationToEnd

- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Select a product
- tapOn:
    type: "Card"
    index: 0
- waitForAnimationToEnd

# Verify price is displayed (should never be empty for purchasable items)
- scroll
- assertVisible:
    type: "Text"


# ─────────────────────────────────────────────────────────────────────────────
# 15. TEST CURRENCY/LOCALIZATION
# ─────────────────────────────────────────────────────────────────────────────
# This test verifies that prices and numbers are displayed correctly
# Navigate to cart if items exist
- tapOn:
    text: "Cart"
    index: 0
- waitForAnimationToEnd

# Verify price formatting (currency symbol present)
- scroll
- waitForAnimationToEnd

# Look for any price indicators
- assertVisible:
    text: "\\$|USD|price|total"
    isRegex: true
