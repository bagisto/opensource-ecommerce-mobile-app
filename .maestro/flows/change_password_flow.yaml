appId: com.webkul.bagistoApp.iOS
---
# ═════════════════════════════════════════════════════════════════════════════
# CHANGE PASSWORD FLOW TEST
# ═════════════════════════════════════════════════════════════════════════════
# This flow covers:
# - Navigate to settings/profile for password change
# - Verify current password field
# - Enter new password
# - Confirm new password
# - Validation for password strength
# - Validation for matching passwords
# - Success confirmation
# - Back navigation
#
# Preconditions: App is installed, user is logged in
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# 1. LAUNCH APP AND LOGIN
# ─────────────────────────────────────────────────────────────────────────────
- launchApp
- waitForAnimationToEnd

- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 2. LOGIN TO ACCOUNT
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Login"
- waitForAnimationToEnd

# Enter email
- tapOn:
    type: "TextField"
    index: 0
- inputText: "test@example.com"

# Enter password
- tapOn:
    type: "TextField"
    index: 1
- inputText: "password123"

# Tap login
- tapOn:
    text: "Login"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 3. VERIFY LOGIN SUCCESS
# ─────────────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 4. NAVIGATE TO ACCOUNT
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 5. VERIFY ACCOUNT DASHBOARD
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "My Account"


# ─────────────────────────────────────────────────────────────────────────────
# 6. NAVIGATE TO SETTINGS OR PROFILE
# ─────────────────────────────────────────────────────────────────────────────
# Scroll to find settings or profile options
- scroll
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 7. LOOK FOR CHANGE PASSWORD OR SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Settings|Change Password|Profile|Security"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 8. VERIFY CHANGE PASSWORD PAGE LOADS
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "Change Password|Password|Security"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 9. VERIFY PASSWORD FIELDS ARE PRESENT
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    type: "TextField"


# ─────────────────────────────────────────────────────────────────────────────
# 10. TRY TO SUBMIT WITHOUT ENTERING ANYTHING
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd

# Verify validation error
- assertVisible:
    text: "required|enter|please"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 11. ENTER CURRENT PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 0
- inputText: "password123"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 12. TRY SUBMITTING WITHOUT NEW PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 13. ENTER NEW PASSWORD (SHORT - SHOULD FAIL)
# ─────────────────────────────────────────────────────────────────────────────
# Enter a short password
- tapOn:
    type: "TextField"
    index: 1
- inputText: "123"

# Try to submit
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 14. VERIFY PASSWORD STRENGTH VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
# Check for password strength error
- assertVisible:
    text: "short|weak|length|minimum|characters"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 15. ENTER VALID NEW PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 1
- doubleTap
- inputText: "newpassword123"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 16. ENTER DIFFERENT CONFIRM PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 2
- inputText: "differentpassword456"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 17. TRY TO SUBMIT WITH MISMATCHED PASSWORDS
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 18. VERIFY PASSWORD MATCH VALIDATION
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "match|same|identical|confirm"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 19. CORRECT THE CONFIRM PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 2
- doubleTap
- inputText: "newpassword123"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 20. SUBMIT PASSWORD CHANGE
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 21. VERIFY SUCCESS MESSAGE
# ─────────────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd

# Check for success message
- assertVisible:
    text: "success|updated|changed|saved|successfully"
    isRegex: true


# ─────────────────────────────────────────────────────────────────────────────
# 22. VERIFY CAN LOGIN WITH NEW PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- scroll
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 23. LOGOUT
# ─────────────────────────────────────────────────────────────────────────────
- scroll:
    down: 5
- waitForAnimationToEnd

- tapOn:
    text: "Logout"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 24. VERIFY LOGOUT SUCCESSFUL
# ─────────────────────────────────────────────────────────────────────────────
- assertVisible:
    text: "Login"


# ─────────────────────────────────────────────────────────────────────────────
# 25. LOGIN WITH NEW PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Login"
- waitForAnimationToEnd

# Enter email
- tapOn:
    type: "TextField"
    index: 0
- inputText: "test@example.com"

# Enter NEW password
- tapOn:
    type: "TextField"
    index: 1
- inputText: "newpassword123"

# Tap login
- tapOn:
    text: "Login"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 26. VERIFY LOGIN WITH NEW PASSWORD SUCCESS
# ─────────────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 27. NAVIGATE TO ACCOUNT
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Account"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 28. REVERT PASSWORD BACK TO ORIGINAL
# ─────────────────────────────────────────────────────────────────────────────
# Navigate to change password again
- scroll
- waitForAnimationToEnd

- tapOn:
    text: "Settings|Change Password|Profile|Security"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 29. ENTER CURRENT (NEW) PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 0
- inputText: "newpassword123"


# ─────────────────────────────────────────────────────────────────────────────
# 30. ENTER ORIGINAL PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 1
- inputText: "password123"


# ─────────────────────────────────────────────────────────────────────────────
# 31. CONFIRM ORIGINAL PASSWORD
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    type: "TextField"
    index: 2
- inputText: "password123"


# ─────────────────────────────────────────────────────────────────────────────
# 32. SUBMIT PASSWORD CHANGE
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Save|Update|Change Password|Submit"
    isRegex: true
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 33. VERIFY SUCCESS
# ─────────────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 34. LOGOUT
# ─────────────────────────────────────────────────────────────────────────────
- scroll:
    down: 5
- waitForAnimationToEnd

- tapOn:
    text: "Logout"
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 35. VERIFY ORIGINAL PASSWORD WORKS
# ─────────────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Login"
- waitForAnimationToEnd

- tapOn:
    type: "TextField"
    index: 0
- inputText: "test@example.com"

- tapOn:
    type: "TextField"
    index: 1
- inputText: "password123"

- tapOn:
    text: "Login"
    index: 0
- waitForAnimationToEnd


# ─────────────────────────────────────────────────────────────────────────────
# 36. VERIFY LOGIN SUCCESS
# ─────────────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd
